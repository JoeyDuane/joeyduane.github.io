baseURL = "https://joeyduane.github.io/"
title = "Joey Duane's Blog"
languageCode = "zh-CN"
theme = "PaperMod"

paginate = 10
summaryLength = 30

[params]
  author = "Joey Duane"
  description = "技术笔记 · 学术研究 · 个人日志"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowToc = true
  ShowCodeCopyButton = true
  ShowWordCount = true
  comments = false

  # Home page info
  [params.homeInfoParams]
    Title = "你好，这里是 Joey。"
    Content = "我使用 Blog 来记录技术笔记、研究进展和生活随笔。"

  [params.socialIcons]
    [[params.socialIcons.icon]]
      name = "github"
      url = "https://github.com/JoeyDuane"

# Main menu (TOML array of tables)
[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "journal"
  name = "日志"
  url = "/journal/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 30